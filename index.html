<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Anniversary | DJ BEATS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700;900&display=swap');

        body {
            margin: 0; padding: 0; background: #050505;
            color: #fff; font-family: 'Montserrat', sans-serif;
            text-align: center; overflow-x: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
        }

        /* Animated Heart Background */
        .heart-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; overflow: hidden;
        }

        .floating-heart {
            position: absolute; color: rgba(255, 215, 0, 0.15);
            animation: pulse-heart 4s infinite ease-in-out;
        }

        @keyframes pulse-heart {
            0%, 100% { transform: scale(0.8); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }

        /* Top Moving Header */
        .top-bar {
            background: linear-gradient(90deg, #ffd700, #b8860b, #ffd700);
            color: #000; padding: 10px 0; font-weight: 900;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            box-shadow: 0 5px 25px rgba(255,215,0,0.5);
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* Professional DJ BEATS Logo */
        .logo-div { margin-top: 100px; padding: 20px; position: relative; }
        .logo-circle {
            width: 120px; height: 120px; border: 4px solid #ffd700;
            border-radius: 50%; margin: 0 auto; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 30px #ffd700, inset 0 0 20px #ffd700;
            animation: rotate-border 10s linear infinite;
        }
        .logo-div i { font-size: 3.5rem; color: #fff; text-shadow: 0 0 15px #ffd700; position: absolute; top: 45px; }
        .dj-text { 
            font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; 
            display: block; color: #ffd700; margin-top: 30px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        @keyframes rotate-border {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Dashboard Hero Section */
        .main-dashboard { max-width: 95%; margin: 40px auto; }
        .featured-img {
            width: 100%; max-height: 80vh; object-fit: contain; /* No cropping */
            border-radius: 15px; border: 2px solid rgba(255, 215, 0, 0.5);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive; font-size: clamp(4rem, 15vw, 8rem);
            color: #ffd700; margin: 20px 0;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }

        /* Professional Photo Grid (Actual Sizes) */
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto;
        }
        .photo-card {
            background: rgba(255,255,255,0.03); border-radius: 10px; 
            padding: 10px; border: 1px solid rgba(255,215,0,0.2);
            transition: 0.5s ease;
        }
        .photo-card:hover { 
            transform: scale(1.02); background: rgba(255,215,0,0.05);
            border-color: #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.2);
        }
        .photo-card img { 
            width: 100%; height: auto; /* Show actual proportions */
            max-height: 600px; object-fit: contain; 
            border-radius: 5px;
        }

        /* Footer */
        .footer {
            background: #000; padding: 80px 20px;
            border-top: 3px solid #ffd700; margin-top: 100px;
        }
        .ashish-brand { font-size: 1rem; letter-spacing: 5px; color: #666; margin-top: 30px; }
        .ashish-brand b { color: #ffd700; font-weight: 900; }

        /* Music Controls */
        #music-btn {
            position: fixed; bottom: 40px; right: 40px;
            background: #ffd700; color: #000; border: none;
            width: 70px; height: 70px; border-radius: 50%;
            cursor: pointer; z-index: 2000; font-size: 1.8rem;
            box-shadow: 0 0 40px rgba(255,215,0,0.6);
            transition: 0.3s;
        }
        #music-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="heart-bg" id="heart-container"></div>

    <div class="top-bar">
        <marquee scrollamount="12">DJ BEATS KI TRAF SE HAPPY ANNIVERSARY DEEPIKA JI ✨ WISHING YOU FOREVER TOGETHERNESS ✨ LOVE & HAPPINESS ✨</marquee>
    </div>

    <div class="logo-div">
        <div class="logo-circle"></div>
        <i class="fas fa-headphones-alt"></i>
        <span class="dj-text">DJ BEATS</span>
    </div>

    <div class="main-dashboard">
        <img src="WhatsApp Image 2026-05-09 at 3.36.18 PM.jpeg" class="featured-img" alt="Deepika Ji">
    </div>

    <section class="hero">
        <h1>Forever Love</h1>
        <h2 style="font-weight: 300; letter-spacing: 5px; color: #ffd700;">DEEPIKA & MAHI</h2>
    </section>

    <div class="gallery">
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (3).jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (2).jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (1).jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM.jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM (1).jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM.jpeg"></div>
    </div>

    <div class="footer">
        <h3 style="font-family: 'Great Vibes'; font-size: 4rem; color: #ffd700; margin-bottom: 0;">Truly Madly Deeply</h3>
        <p style="letter-spacing: 5px; font-size: 0.9rem;">PRESENTED BY DJ BEATS FAMILY</p>
        <div class="ashish-brand">DEVELOPED BY <b>ASHISH</b></div>
    </div>

    <audio id="bg-music" loop><source src="song.mp3" type="audio/mpeg"></audio>
    <button id="music-btn" onclick="toggleMusic()"><i class="fas fa-play"></i></button>

    <script>
        // Generating Pulsating Hearts
        const container = document.getElementById('heart-container');
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('i');
            heart.className = 'fas fa-heart floating-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 100 + 'vh';
            heart.style.fontSize = (Math.random() * 30 + 10) + 'px';
            heart.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(heart);
        }

        function toggleMusic() {
            var music = document.getElementById("bg-music");
            var btn = document.getElementById("music-btn");
            if (music.paused) { 
                music.play(); 
                btn.innerHTML = '<i class="fas fa-pause"></i>';
                btn.style.animation = "pulse-heart 1s infinite";
            } else { 
                music.pause(); 
                btn.innerHTML = '<i class="fas fa-play"></i>';
                btn.style.animation = "none";
            }
        }
    </script>
</body>
</html>
