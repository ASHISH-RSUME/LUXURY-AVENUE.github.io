<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivansh | Kuan Poojan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- AOS Library for Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { background: #fdfaf6; font-family: 'Poppins', sans-serif; }
        .hero-text { text-shadow: 2px 2px 8px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="h-screen flex flex-col justify-center items-center text-center p-6 bg-gradient-to-b from-amber-100 to-white">
        <h1 data-aos="fade-down" data-aos-duration="1000" class="text-6xl font-bold text-amber-800 mb-4">Kuan Poojan</h1>
        <p data-aos="fade-up" data-aos-duration="1500" class="text-2xl text-gray-700">Celebrating little Shivansh</p>
    </section>

    <!-- Animated Section -->
    <section class="py-20 px-6 max-w-2xl mx-auto">
        <div data-aos="zoom-in" data-aos-duration="1200" class="bg-white p-8 rounded-3xl shadow-2xl border-2 border-amber-300">
            <h2 class="text-3xl font-bold text-center mb-6">Aapka Swagat Hai!</h2>
            <p class="text-center text-gray-600">Shivansh ke Kuan Poojan ke shubh avsar par aap sabhi ko amantrit karte hain.</p>
        </div>
    </section>

    <!-- Script for Animations -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
