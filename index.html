<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivansh | Kuan Poojan Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body { background-color: #fdfaf6; font-family: 'Cinzel', serif; overflow-x: hidden; }
        .panel { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .card { background: white; padding: 3rem; border-radius: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>

    <!-- Section 1: Hero Zoom -->
    <section class="panel">
        <div class="card" id="hero">
            <h1 class="text-6xl font-bold text-amber-800">Kuan Poojan</h1>
            <p class="text-2xl mt-4">Shivansh's Celebration</p>
        </div>
    </section>

    <!-- Section 2: Details Slide In -->
    <section class="panel">
        <div class="card reveal">
            <h2 class="text-3xl font-bold text-amber-800">Date & Time</h2>
            <p class="text-xl mt-2">22nd June 2026, 4:00 PM</p>
        </div>
    </section>

    <!-- Section 3: Venue Reveal -->
    <section class="panel">
        <div class="card reveal">
            <h2 class="text-3xl font-bold text-amber-800">Venue</h2>
            <p class="text-xl mt-2">Shiv Parvati Dharamshala, Shahdara</p>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Zoom Animation for Hero
        gsap.to("#hero", {
            scale: 1.5,
            opacity: 0,
            scrollTrigger: {
                trigger: "#hero",
                start: "top top",
                end: "bottom top",
                scrub: true
            }
        });

        // Reveal Animation for Cards
        gsap.utils.toArray(".reveal").forEach((panel) => {
            gsap.from(panel, {
                y: 100,
                opacity: 0,
                duration: 1,
                scrollTrigger: {
                    trigger: panel,
                    start: "top 80%",
                    toggleActions: "play none none reverse"
                }
            });
        });
    </script>
</body>
</html>
